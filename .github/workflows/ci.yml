name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Test & Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Checkstyle
        run: ./gradlew checkstyleMain

      - name: Test
        run: ./gradlew test
